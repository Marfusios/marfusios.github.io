<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 — Not found · Mariusz Kotas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/colors-and-type.css">
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    .nf {
      max-width: 1120px; margin: 0 auto; padding: 120px 32px;
      text-align: center;
    }
    .nf .code {
      font-family: var(--font-mono); font-size: 13px;
      color: var(--ink-500); letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .nf h1 {
      font-family: var(--font-display); font-weight: 600;
      font-size: 56px; line-height: 1.1; letter-spacing: -0.02em;
      margin: 0 0 24px; color: var(--ink-900);
    }
    .nf h1 .em { font-style: italic; font-weight: 500; color: var(--gold-700); }
    .nf p { font-size: 17px; color: var(--ink-700); max-width: 50ch; margin: 0 auto 32px; }
    .nf a.home {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 18px; border-radius: 10px;
      background: var(--navy-800); color: var(--paper);
      border: none; font-size: 14px; font-weight: 500;
    }
    .nf a.home:hover { background: var(--navy-700); border: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="brand" aria-label="Mariusz Kotas — Home">
      <img src="/images/logo.png" alt="" width="32" height="32">
      <span>Mariusz Kotas</span>
    </a>
  </header>
  <main class="nf">
    <div class="code">404 · Not found</div>
    <h1>This <span class="em">page</span> wandered off.</h1>
    <p>The link is broken or the page has moved. Head back to the start.</p>
    <a class="home" href="/">← Back to home</a>
  </main>
</body>
</html>
